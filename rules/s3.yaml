# this s3 rule file will contain all the rules related to s3 and it will be used by the scan engine to run the s3 rules and generate the report based on the scan results.

- id: AWS-S3-001
  title: S3 Bucket Public Access Block Not Enabled
  severity: HIGH
  cis: CIS AWS 2.1.1
  resource: s3_bucket
  condition: public_access_block.BlockPublicAcls == false

- id: AWS-S3-002
  title: S3 Bucket Encryption Disabled
  severity: MEDIUM
  cis: CIS AWS 2.1.2
  resource: s3_bucket
  condition: encryption_enabled == false

- id: AWS-S3-003
  title: S3 Bucket Versioning Disabled
  severity: LOW
  cis: CIS AWS 2.1.3
  resource: s3_bucket
  condition: versioning_enabled == false
